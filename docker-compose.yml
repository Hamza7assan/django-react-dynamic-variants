version: '3.8'

services:
  # Backend Django service
  backend:
    build: ./backend
    container_name: ecommerce_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=*
    # Automatically run migrations and seed before starting the server
    command: >
      sh -c "python manage.py makemigrations products &&
             python manage.py migrate &&
             python manage.py seed &&
             python manage.py runserver 0.0.0.0:8000"
   # Frontend React service
  frontend:
    build: ./frontend_core
    container_name: ecommerce_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend_core:/app
      - /app/node_modules
    environment:
      # Link frontend to the backend API
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend